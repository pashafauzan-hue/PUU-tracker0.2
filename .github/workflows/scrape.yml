name: Update Agenda Perkara MK

on:
  schedule:
    - cron: '0 20 * * 0'   # Minggu pukul 03:00 WIB (UTC+7)
  workflow_dispatch:         # bisa dijalankan manual dari GitHub

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 openpyxl
          playwright install chromium
          playwright install-deps chromium

      - name: Jalankan scraper
        run: python scraper.py

      - name: Commit dan push data-agenda.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data-agenda.json
          git diff --staged --quiet || git commit -m "update agenda $(date +'%Y-%m-%d')"
          git push
