name: Update Agenda Perkara MK

on:
  schedule:
    - cron: '0 20 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Xvfb (virtual display untuk headless=False)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb

      - name: Install Python dependencies
        run: |
          pip install playwright beautifulsoup4 openpyxl
          playwright install chromium
          playwright install-deps chromium

      - name: Jalankan scraper dengan virtual display
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: xvfb-run --server-args="-screen 0 1280x720x24 -ac" python scraper.py

      - name: Commit dan push data-agenda.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data-agenda.json
          git diff --staged --quiet || git commit -m "update agenda $(date +'%Y-%m-%d')"
          git push
